<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; font-family: 'Hanken Grotesk', sans-serif; }
  #wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  #mic {
    width: 100%; min-height: 64px; border: none; border-radius: 9999px;
    background: #b4501f; color: #fff; font-size: 20px; font-weight: 600;
    cursor: pointer; transition: filter .12s ease;
  }
  #mic:hover { filter: brightness(0.96); }
  #mic.listening { background: #ba1a1a; }
  #canvas { width: 100%; height: 40px; display: none; }
  #hint { color: #7a6a63; font-size: 13px; text-align: center; min-height: 18px; }
</style>
</head>
<body>
<div id="wrap">
  <button id="mic">🎙️&nbsp; Tap to speak</button>
  <canvas id="canvas" width="600" height="40"></canvas>
  <div id="hint"></div>
</div>
<script>
// --- Streamlit component protocol (vanilla, no build) -----------------------
function send(type, data) {
  window.parent.postMessage(Object.assign({ isStreamlitMessage: true, type: type }, data), "*");
}
const Streamlit = {
  ready: () => send("streamlit:componentReady", { apiVersion: 1 }),
  height: (h) => send("streamlit:setFrameHeight", { height: h }),
  value: (v) => send("streamlit:setComponentValue", { value: v, dataType: "json" }),
};
function fit() { Streamlit.height(document.getElementById("wrap").scrollHeight + 4); }

// --- Tunable voice-activity-detection thresholds ----------------------------
const SILENCE_MS = 2000;   // stop this long after the user stops talking
const MAX_MS = 15000;      // hard cap on a single recording
const NO_SPEECH_MS = 7000; // give up if they never start talking
const SPEAK_RMS = 9;       // RMS above this = "they're talking"
const SILENCE_RMS = 6;     // RMS below this = "silence"

const micBtn = document.getElementById("mic");
const canvas = document.getElementById("canvas");
const hint = document.getElementById("hint");
const ctx = canvas.getContext("2d");
let THEME = { primary: "#b4501f", onp: "#ffffff", wave: "#b35c37", text: "#55433c" };

// Receive theme colors from Python (component args on every render).
window.addEventListener("message", (e) => {
  if (e.data && e.data.type === "streamlit:render") {
    const a = (e.data.args) || {};
    if (a.primary) THEME.primary = a.primary;
    if (a.on_primary) THEME.onp = a.on_primary;
    if (a.wave) THEME.wave = a.wave;
    if (a.text) THEME.text = a.text;
    hint.style.color = THEME.text;
    if (!recording) { micBtn.style.background = THEME.primary; micBtn.style.color = THEME.onp; }
  }
});

let recorder = null, recording = false, chunks = [];
let stream, audioCtx, analyser, rafId;
let startedAt = 0, lastVoiceAt = 0, hasSpoken = false;

function setRecording(on) {
  recording = on;
  micBtn.classList.toggle("listening", on);
  micBtn.style.background = on ? "#ba1a1a" : THEME.primary;
  micBtn.style.color = THEME.onp;
  micBtn.innerHTML = on ? "⏹&nbsp; Listening… I'll submit when you pause"
                        : "🎙️&nbsp; Tap to speak";
}

function rms() {
  const buf = new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(buf);
  let sum = 0;
  for (let i = 0; i < buf.length; i++) { const d = buf[i] - 128; sum += d * d; }
  return Math.sqrt(sum / buf.length);
}

function draw() {
  const bins = analyser.frequencyBinCount;
  const data = new Uint8Array(bins);
  analyser.getByteFrequencyData(data);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const bw = canvas.width / bins;
  ctx.fillStyle = THEME.wave;
  for (let i = 0; i < bins; i++) {
    const h = (data[i] / 255) * canvas.height;
    ctx.fillRect(i * bw + 1, (canvas.height - h) / 2, bw - 2, Math.max(2, h));
  }
  // Voice-activity auto-stop logic.
  const now = Date.now();
  const level = rms();
  if (level > SPEAK_RMS) { hasSpoken = true; lastVoiceAt = now; }
  if (now - startedAt > MAX_MS) { stop(); return; }
  if (!hasSpoken && now - startedAt > NO_SPEECH_MS) { stop(); return; }
  if (hasSpoken && level < SILENCE_RMS && now - lastVoiceAt > SILENCE_MS) { stop(); return; }
  rafId = requestAnimationFrame(draw);
}

function start() {
  hint.textContent = "";
  if (!navigator.mediaDevices || !window.MediaRecorder) {
    hint.textContent = "Recording isn't supported here — type your question below.";
    return;
  }
  navigator.mediaDevices.getUserMedia({ audio: true }).then((s) => {
    stream = s; chunks = [];
    recorder = new MediaRecorder(s);
    recorder.ondataavailable = (ev) => { if (ev.data.size) chunks.push(ev.data); };
    recorder.onstop = finish;
    recorder.start();

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(s);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    src.connect(analyser);

    startedAt = Date.now(); lastVoiceAt = startedAt; hasSpoken = false;
    canvas.style.display = "block";
    setRecording(true);
    fit();
    draw();
  }).catch(() => {
    hint.textContent = "Couldn't reach the microphone — allow mic access, or type below.";
  });
}

function stop() {
  if (!recording) return;
  cancelAnimationFrame(rafId);
  canvas.style.display = "none";
  setRecording(false);
  try { recorder.stop(); } catch (e) {}
}

function finish() {
  if (stream) stream.getTracks().forEach((t) => t.stop());
  if (audioCtx) audioCtx.close().catch(() => {});
  fit();
  if (!hasSpoken || !chunks.length) {
    hint.textContent = "Didn't catch anything — tap to try again, or type below.";
    return;
  }
  hint.textContent = "Got it — one moment…";
  const blob = new Blob(chunks, { type: recorder.mimeType || "audio/webm" });
  const reader = new FileReader();
  reader.onloadend = () => Streamlit.value({ audio: reader.result, t: Date.now() });
  reader.readAsDataURL(blob);
}

micBtn.addEventListener("click", () => { recording ? stop() : start(); });

Streamlit.ready();
fit();
window.addEventListener("resize", fit);
</script>
</body>
</html>
