<!DOCTYPE html>
<html lang="en" data-theme="hearth">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Su Chef — Recipe Insights</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0&display=swap" rel="stylesheet" />
<link href="{{ url_for('static', filename='app.css') }}" rel="stylesheet" />
<script>
  const t = localStorage.getItem('theme') || 'hearth';
  document.documentElement.setAttribute('data-theme', t);
</script>
</head>
<body>
  <header class="topbar">
    <a class="wordmark" href="/" style="text-decoration:none">Su&nbsp;Chef</a>
    <a class="ctrl" href="/"><span class="material-symbols-outlined">arrow_back</span>Back to cooking</a>
  </header>

  <main class="wrap" style="max-width:880px;">
    <h1 style="font-size:34px;margin:8px 0 2px;">Recipe Insights</h1>
    <p class="ctx">The data project behind Su Chef — a two-crew CrewAI pipeline over ~8,000 recipes.</p>

    <h2 style="margin-top:24px;">Will this recipe be quick?</h2>
    <div class="recipe" style="border-left-width:1px;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <label>Ingredients <input id="ni" type="number" value="8" min="1" max="40" class="num"></label>
        <label>Steps <input id="ns" type="number" value="6" min="1" max="40" class="num"></label>
        <label>Course <select id="course" class="num">{% for c in courses %}<option>{{ c }}</option>{% endfor %}</select></label>
        <label>Diet <select id="diet" class="num">{% for d in diets %}<option>{{ d }}</option>{% endfor %}</select></label>
        <label>Cuisine <select id="cuisine" class="num"><option>Indian</option><option>Continental</option><option>Italian</option><option>Mexican</option><option>Chinese</option><option>Other</option></select></label>
      </div>
      <button class="send" id="predict" style="margin-top:14px;">Predict</button>
      <p id="result" style="font-size:20px;margin-top:14px;"></p>
    </div>

    <h2 style="margin-top:28px;">Exploratory data analysis</h2>
    <iframe src="/insights/eda" style="width:100%;height:560px;border:1px solid var(--outline);border-radius:14px;background:#fff;"></iframe>

    <h2 style="margin-top:28px;">Model card</h2>
    <pre class="md">{{ model_card }}</pre>
    <h2 style="margin-top:20px;">Evaluation report</h2>
    <pre class="md">{{ evaluation }}</pre>
  </main>

<style>
  .num { width:100%; height:44px; padding:0 12px; margin-top:4px; border:1px solid var(--outline);
    border-radius:10px; background:var(--card); color:var(--text); font:inherit; }
  label { font-weight:600; font-size:14px; color:var(--muted); }
  .md { white-space:pre-wrap; background:var(--card); border:1px solid var(--outline);
    border-radius:12px; padding:16px 18px; font-family:'Work Sans',sans-serif; font-size:15px;
    color:var(--text); line-height:1.5; }
</style>
<script>
document.getElementById('predict').onclick = async () => {
  const body = { num_ingredients:+document.getElementById('ni').value, num_steps:+document.getElementById('ns').value,
    cuisine:document.getElementById('cuisine').value, course:document.getElementById('course').value, diet:document.getElementById('diet').value };
  const res = await fetch('/api/predict', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  const d = await res.json();
  const el = document.getElementById('result');
  if (d.quick_prob != null) { const q = d.quick_prob >= 0.5;
    el.innerHTML = `<b style="color:var(--primary)">${q?'Likely quick (≤45 min)':'More involved (>45 min)'}</b> — ${Math.round(d.quick_prob*100)}% likely quick.`; }
  else el.textContent = d.error || 'Prediction unavailable';
};
</script>
</body>
</html>
