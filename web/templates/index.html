<!DOCTYPE html>
<html lang="en" data-theme="hearth">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Su Chef</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0&display=swap" rel="stylesheet" />
<link href="{{ url_for('static', filename='app.css') }}" rel="stylesheet" />
</head>
<body>
  <header class="topbar">
    <div class="wordmark" id="home" title="New question">Su&nbsp;Chef</div>
    <div class="controls">
      <button class="ctrl" id="newBtn"><span class="material-symbols-outlined">add</span>New</button>
      <button class="ctrl" id="insightsBtn"><span class="material-symbols-outlined">bar_chart</span>Insights</button>
      <div class="seg" id="units">
        <button data-u="metric" class="active">°C</button>
        <button data-u="us">°F</button>
      </div>
      <label class="ctrl"><span class="material-symbols-outlined">palette</span>
        <select id="theme">
          <option value="hearth">Hearth</option>
          <option value="dusk">Dusk</option>
          <option value="charcoal">Charcoal</option>
        </select>
      </label>
      <label class="ctrl"><span class="material-symbols-outlined">record_voice_over</span>
        <select id="voice"></select>
      </label>
      <button class="ctrl toggle on" id="audioToggle" title="Read answers aloud">
        <span class="material-symbols-outlined">volume_up</span>Audio
      </button>
    </div>
  </header>

  <main class="wrap">
    <div id="empty" class="empty">
      <h1>Let me help.</h1>
      <p>Ask me anything while you cook!</p>
    </div>
    <div class="composer">
      <button id="mic" class="iconbtn" title="Tap to speak"><span class="material-symbols-outlined">mic</span></button>
      <input id="q" type="text" placeholder='e.g. "out of buttermilk — what now?"' autocomplete="off" />
      <button id="send" class="send">Ask</button>
    </div>
    <div id="thread"></div>
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
